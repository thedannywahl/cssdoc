packages:
  - packages/*
  - emitters/*
  - generators/*
  - plugins/*
  - servers/*
  - docs

catalogMode: prefer

catalog:
  # Toolchain
  typescript: ^6.0.3
  "@types/node": ^24.13.2
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vite-plus: 0.2.2
  # Core
  postcss: ^8.5.16
  grammarkdown: ^3.3.2
  # Config
  ajv: ^8.20.0
  # TypeDoc integration
  typedoc: ^0.28.19
  typedoc-plugin-markdown: ^4.12.0
  # Lint adapters
  stylelint: ^17.14.0
  eslint: ^10.6.0
  "@eslint/css": ^1.4.0
  "@html-eslint/parser": ^0.63.0
  # Language server + editor
  vscode-languageserver: ^10.1.0
  vscode-languageserver-textdocument: ^1.0.12
  vscode-languageclient: ^10.1.0
  "@types/vscode": ^1.125.0
  esbuild: ^0.28.1
  "@vscode/vsce": ^3.9.2
  "@resvg/resvg-js": ^2.6.2
  # Docs site
  vitepress: ^1.6.4
  # Quality gates
  "@vitest/coverage-v8": 4.1.9
  publint: ^0.3.21
  # Release
  changelogen: ^0.6.2
  bumpp: ^11.1.0
  "@commitlint/cli": ^21.2.1
  "@commitlint/config-conventional": ^21.2.0

allowBuilds:
  esbuild: true
  "@vscode/vsce-sign": false
  keytar: false
