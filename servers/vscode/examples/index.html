<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>cssdoc example</title>
    <link rel="stylesheet" href="components.css" />
  </head>
  <body>
    <!-- Valid: hover `-color-secondary` for its docs; go-to-definition jumps into components.css;
         type a space inside class="…" to get modifier completions. -->
    <button class="button -color-secondary">OK</button>

    <!-- Unknown modifier: cssdoc/valid-class-usage flags `-bogus`. -->
    <button class="button -bogus">Unknown modifier</button>

    <!-- Deprecated modifier: a quick-fix offers "Replace with .-color-secondary". -->
    <button class="button -variant-old">Deprecated modifier</button>
  </body>
</html>
