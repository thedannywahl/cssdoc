name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "icon.svg"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/docs.yml"
      # The API reference is generated from package sources, so redeploy when they change.
      - "packages/**"
      - "emitters/**"
      - "generators/**"
      - "plugins/**"
      - "servers/**"
      - "syntaxes/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build the packages first: the API reference extracts them, and `docs:build` loads the built
      # @cssdoc/typedoc plugin from its dist.
      - name: Build packages
        run: pnpm run build
      # Served at the apex domain cssdoc.dev, so the default base (/) is correct — no DOCS_BASE override.
      - name: Build docs
        run: pnpm run docs:build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
