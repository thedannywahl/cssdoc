name: Release

# Tag-driven: `vp run release` bumps + tags locally; pushing the `v*` tag triggers this.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - name: Gate
        run: vp run ready && vp run check:publish
      # Tokenless OIDC trusted publishing (no NODE_AUTH_TOKEN). Requires a trusted publisher configured
      # on npm for each @cssdoc/* package (repo thedannywahl/cssdoc, workflow release.yml). The `id-token`
      # permission lets vp exchange the OIDC token for a short-lived publish token against the default
      # registry; provenance is attested from the same identity.
      - name: Publish to npm
        run: vp run publish # vp pm publish -r --provenance --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  # Deploy the docs once the packages are on npm. Depends only on `publish`, so a flaky extension
  # publish (below) never blocks it.
  docs:
    needs: publish
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/docs.yml

  publish-extension:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      # Package once, then publish to each marketplace independently. The Marketplace (vsce) is
      # best-effort — a failing PAT there must not skip the Open VSX publish — and the .vsix is
      # attached to the Release so it can be uploaded to the Marketplace by hand / sideloaded.
      - name: Package extension
        run: vp run ext:package
      - name: Attach .vsix to the release
        uses: softprops/action-gh-release@v3
        with:
          files: servers/vscode/cssdoc.vsix
      - name: Publish to VS Code Marketplace (best-effort)
        continue-on-error: true
        run: vp run ext:publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        run: vp run ext:publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
