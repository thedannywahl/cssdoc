name: Release

# Tag-driven: `vp run release` bumps + tags locally; pushing the `v*` tag triggers this.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Gate
        run: pnpm run build && pnpm run check && pnpm run test && pnpm run check:publish
      - name: Publish to npm
        run: pnpm run publish # vp pm publish -r --access public --no-git-checks
        env:
          # First release is token-bootstrapped (OIDC trusted publishing can't be configured for
          # packages that don't exist yet). Provenance returns once we switch to OIDC for 0.2.0.
          # NODE_AUTH_TOKEN must be an npm *automation* token so CI isn't prompted for a 2FA OTP.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  publish-extension:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Package once, then publish to each marketplace independently. The Marketplace (vsce) is
      # best-effort — a failing PAT there must not skip the Open VSX publish — and the .vsix is
      # attached to the Release so it can be uploaded to the Marketplace by hand / sideloaded.
      - name: Package extension
        run: pnpm run ext:package
      - name: Attach .vsix to the release
        uses: softprops/action-gh-release@v3
        with:
          files: servers/vscode/cssdoc.vsix
      - name: Publish to VS Code Marketplace (best-effort)
        continue-on-error: true
        run: pnpm run ext:publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        run: pnpm run ext:publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
