name: Release

# Tag-driven: `vp run release` bumps + tags locally; pushing the `v*` tag triggers this.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # OIDC for npm provenance / trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - name: Gate
        run: pnpm exec vp run ready && pnpm exec vp run check:publish
      # Tokenless OIDC trusted publishing (no NODE_AUTH_TOKEN). Requires a trusted publisher configured
      # on npm for each @cssdoc/* package (repo thedannywahl/cssdoc, workflow release.yml). pnpm exchanges
      # the id-token for a short-lived publish token; provenance is attested from the same identity.
      - name: Publish to npm
        run: pnpm exec vp run publish # vp pm publish -r --provenance --access public --no-git-checks
        env:
          NPM_CONFIG_PROVENANCE: "true"
      - name: GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

  publish-extension:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Package once, then publish to each marketplace independently. The Marketplace (vsce) is
      # best-effort — a failing PAT there must not skip the Open VSX publish — and the .vsix is
      # attached to the Release so it can be uploaded to the Marketplace by hand / sideloaded.
      - name: Package extension
        run: pnpm exec vp run ext:package
      - name: Attach .vsix to the release
        uses: softprops/action-gh-release@v3
        with:
          files: servers/vscode/cssdoc.vsix
      - name: Publish to VS Code Marketplace (best-effort)
        continue-on-error: true
        run: pnpm exec vp run ext:publish:vsce
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        run: pnpm exec vp run ext:publish:ovsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
